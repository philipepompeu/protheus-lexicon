name: CI - Build e Testes Automatizados

on:
  push:
    branches:
      - main  # Roda a pipeline sempre que houver commit na branch main
      - develop  # Também pode rodar na develop (se quiser)
  pull_request:
    branches:
      - main  # Roda nos PRs para a main
